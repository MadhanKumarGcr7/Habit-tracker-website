<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Habit Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />

  <style>
    /* =============================================
       CSS CUSTOM PROPERTIES (DESIGN TOKENS)
    ============================================= */
    :root {
      --bg-base:        #0a0a0f;
      --bg-surface:     #111118;
      --bg-card:        #16161f;
      --bg-hover:       #1e1e2a;

      --accent:         #00f5a0;       /* neon green */
      --accent-dim:     rgba(0, 245, 160, 0.15);
      --accent-glow:    rgba(0, 245, 160, 0.35);

      --text-primary:   #eeeef5;
      --text-secondary: #7a7a96;
      --text-muted:     #3e3e58;

      --border:         rgba(255, 255, 255, 0.06);
      --border-accent:  rgba(0, 245, 160, 0.3);

      --radius-sm:      6px;
      --radius-md:      12px;
      --radius-lg:      20px;

      --font-display:   'Syne', sans-serif;
      --font-mono:      'Space Mono', monospace;

      --transition:     0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* =============================================
       RESET & BASE
    ============================================= */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-display);
      min-height: 100vh;
      /* Subtle grid background texture */
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* =============================================
       LAYOUT WRAPPER
    ============================================= */
    .app-wrapper {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* =============================================
       HEADER
    ============================================= */
    .app-header {
      margin-bottom: 40px;
    }

    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 6px;
    }

    .app-title {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1;
      /* Glowing accent on the dot */
    }

    .app-title span {
      color: var(--accent);
      text-shadow: 0 0 20px var(--accent-glow);
    }

    .week-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-secondary);
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
      margin-top: 4px;
    }

    .app-subtitle {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    /* =============================================
       GLOBAL PROGRESS BAR
    ============================================= */
    .progress-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 20px 24px;
      margin-bottom: 28px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
    }

    .progress-label {
      font-size: 0.7rem;
      font-family: var(--font-mono);
      color: var(--text-secondary);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .progress-pct {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent);
      text-shadow: 0 0 12px var(--accent-glow);
      line-height: 1;
      transition: color var(--transition);
    }

    .progress-track {
      width: 100%;
      height: 8px;
      background: var(--bg-hover);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;                        /* updated by JS */
      background: linear-gradient(90deg, var(--accent), #00c8ff);
      border-radius: 99px;
      box-shadow: 0 0 12px var(--accent-glow);
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .progress-sub {
      margin-top: 10px;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    /* =============================================
       ADD HABIT FORM
    ============================================= */
    .add-habit-form {
      display: flex;
      gap: 10px;
      margin-bottom: 32px;
    }

    .habit-input {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-display);
      font-size: 0.9rem;
      padding: 12px 16px;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .habit-input::placeholder { color: var(--text-muted); }

    .habit-input:focus {
      border-color: var(--border-accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .btn-add {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 700;
      padding: 12px 22px;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: 0.3px;
      box-shadow: 0 0 16px var(--accent-glow);
      transition: opacity var(--transition), transform var(--transition), box-shadow var(--transition);
    }

    .btn-add:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 0 24px var(--accent-glow);
    }

    .btn-add:active { transform: translateY(0); }

    /* =============================================
       DAY HEADER ROW
    ============================================= */
    .day-headers {
      display: grid;
      grid-template-columns: minmax(130px, 1.8fr) repeat(7, 1fr);
      gap: 6px;
      padding: 0 0 8px;
      padding-left: 4px;
    }

    .day-headers .day-name {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      text-align: center;
    }

    .day-headers .today-label {
      color: var(--accent);
      text-shadow: 0 0 8px var(--accent-glow);
    }

    /* =============================================
       HABIT LIST
    ============================================= */
    .habit-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      letter-spacing: 0.5px;
      display: none; /* shown via JS */
    }

    .empty-state .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
      display: block;
    }

    /* =============================================
       HABIT ROW
    ============================================= */
    .habit-row {
      display: grid;
      grid-template-columns: minmax(130px, 1.8fr) repeat(7, 1fr);
      gap: 6px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 12px;
      align-items: center;
      transition: border-color var(--transition), background var(--transition);
      animation: rowIn 0.3s ease both;
    }

    @keyframes rowIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .habit-row:hover {
      border-color: var(--border-accent);
      background: var(--bg-hover);
    }

    /* Habit name + delete */
    .habit-info {
      display: flex;
      align-items: center;
      gap: 8px;
      overflow: hidden;
    }

    .habit-name {
      font-size: 0.88rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .btn-delete {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px 4px;
      font-size: 0.75rem;
      border-radius: var(--radius-sm);
      flex-shrink: 0;
      transition: color var(--transition), background var(--transition);
      line-height: 1;
    }

    .btn-delete:hover {
      color: #ff5c5c;
      background: rgba(255, 92, 92, 0.1);
    }

    /* =============================================
       CHECKBOX CELLS
    ============================================= */
    .day-cell {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Hide native checkbox */
    .day-cell input[type="checkbox"] {
      display: none;
    }

    .day-cell label {
      width: 32px;
      height: 32px;
      border: 1.5px solid var(--text-muted);
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition:
        border-color var(--transition),
        background var(--transition),
        box-shadow var(--transition),
        transform var(--transition);
      position: relative;
    }

    /* Checkmark via pseudo-element */
    .day-cell label::after {
      content: '';
      width: 8px;
      height: 13px;
      border-right: 2.5px solid var(--accent);
      border-bottom: 2.5px solid var(--accent);
      transform: rotate(45deg) scale(0);
      transition: transform 0.15s ease;
      margin-top: -2px;
    }

    .day-cell input[type="checkbox"]:checked + label {
      background: var(--accent-dim);
      border-color: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .day-cell input[type="checkbox"]:checked + label::after {
      transform: rotate(45deg) scale(1);
    }

    .day-cell label:hover {
      border-color: var(--accent);
      transform: scale(1.1);
    }

    /* Today column highlight */
    .day-cell.is-today label {
      border-color: rgba(0, 245, 160, 0.4);
    }

    /* =============================================
       FOOTER / CLEAR WEEK BUTTON
    ============================================= */
    .app-footer {
      margin-top: 40px;
      display: flex;
      justify-content: center;
    }

    .btn-clear {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: border-color var(--transition), color var(--transition), background var(--transition);
    }

    .btn-clear:hover {
      border-color: #ff5c5c;
      color: #ff5c5c;
      background: rgba(255, 92, 92, 0.06);
    }

    /* =============================================
       RESPONSIVE — MOBILE
    ============================================= */
    @media (max-width: 560px) {
      .day-headers,
      .habit-row {
        grid-template-columns: minmax(90px, 1.4fr) repeat(7, 1fr);
        gap: 4px;
        padding: 10px 8px;
      }

      .day-cell label {
        width: 26px;
        height: 26px;
        border-radius: 4px;
      }

      .habit-name { font-size: 0.78rem; }

      .btn-delete { font-size: 0.65rem; }

      .progress-section { padding: 16px; }
    }
  </style>
</head>
<body>

<div class="app-wrapper">

  <!-- ── HEADER ── -->
  <header class="app-header">
    <div class="header-top">
      <h1 class="app-title">Habit<span>.</span></h1>
      <div class="week-label" id="weekLabel">Week — —</div>
    </div>
    <p class="app-subtitle">// track your weekly streak</p>
  </header>

  <!-- ── GLOBAL PROGRESS BAR ── -->
  <section class="progress-section" aria-label="Weekly progress">
    <div class="progress-meta">
      <span class="progress-label">Weekly Progress</span>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <div class="progress-track" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <p class="progress-sub" id="progressSub">Add habits to start tracking</p>
  </section>

  <!-- ── ADD HABIT ── -->
  <div class="add-habit-form">
    <input
      type="text"
      class="habit-input"
      id="habitInput"
      placeholder="New habit (e.g. Meditate, Read, Gym…)"
      maxlength="36"
      autocomplete="off"
      aria-label="New habit name"
    />
    <button class="btn-add" id="btnAdd" aria-label="Add habit">+ Add</button>
  </div>

  <!-- ── DAY HEADER ROW ── -->
  <div class="day-headers" id="dayHeaders">
    <div></div><!-- spacer for habit-name column -->
    <!-- Day labels injected by JS -->
  </div>

  <!-- ── HABIT LIST ── -->
  <main class="habit-list" id="habitList" aria-label="Habit list"></main>

  <!-- ── EMPTY STATE ── -->
  <div class="empty-state" id="emptyState">
    <span class="empty-icon">🌱</span>
    No habits yet — add one above to begin.
  </div>

  <!-- ── FOOTER ── -->
  <footer class="app-footer">
    <button class="btn-clear" id="btnClearWeek">↺ Reset all checks this week</button>
  </footer>

</div>

<!-- =============================================
     JAVASCRIPT
============================================= -->
<script>
  /* ──────────────────────────────────────────────
     STATE SHAPE (single source of truth)
     Stored in localStorage under key "habitState"

     state = {
       habits: [
         {
           id:     string,          // unique identifier
           name:   string,          // display name
           days:   [bool x 7]       // Mon=0 … Sun=6
         },
         …
       ]
     }
  ────────────────────────────────────────────── */

  const STORAGE_KEY = 'habitState';
  const DAY_NAMES   = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

  // ── Determine today's column index (Mon=0 … Sun=6) ──
  const todayIndex = (() => {
    const d = new Date().getDay(); // 0=Sun … 6=Sat
    return d === 0 ? 6 : d - 1;   // remap to Mon-first
  })();

  // ── Load or initialise state ──
  let state = loadState();

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (_) { /* corrupted storage — fall through */ }
    return { habits: [] };
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  // ── Helpers ──
  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  function getWeekLabel() {
    const now  = new Date();
    // Monday of current week
    const day  = now.getDay();
    const diff = now.getDate() - day + (day === 0 ? -6 : 1);
    const mon  = new Date(now.setDate(diff));
    const sun  = new Date(mon);
    sun.setDate(mon.getDate() + 6);
    const fmt  = (d) => d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    return `${fmt(mon)} – ${fmt(sun)}`;
  }

  // ── Compute global progress ──
  function computeProgress() {
    const total   = state.habits.length * 7;
    const checked = state.habits.reduce(
      (sum, h) => sum + h.days.filter(Boolean).length, 0
    );
    return total === 0 ? 0 : Math.round((checked / total) * 100);
  }

  // ── Update progress bar UI ──
  function renderProgress() {
    const pct  = computeProgress();
    const fill = document.getElementById('progressFill');
    const pctEl = document.getElementById('progressPct');
    const sub   = document.getElementById('progressSub');
    const bar   = document.getElementById('progressBar');

    fill.style.width = pct + '%';
    pctEl.textContent = pct + '%';
    bar.setAttribute('aria-valuenow', pct);

    const totalHabits  = state.habits.length;
    const totalChecked = state.habits.reduce(
      (s, h) => s + h.days.filter(Boolean).length, 0
    );

    if (totalHabits === 0) {
      sub.textContent = 'Add habits to start tracking';
    } else {
      sub.textContent = `${totalChecked} of ${totalHabits * 7} possible check-ins completed`;
    }
  }

  // ── Render day-header labels ──
  function renderDayHeaders() {
    const container = document.getElementById('dayHeaders');
    // Remove existing day labels (keep spacer)
    while (container.children.length > 1) container.removeChild(container.lastChild);

    DAY_NAMES.forEach((name, i) => {
      const el = document.createElement('div');
      el.className = 'day-name' + (i === todayIndex ? ' today-label' : '');
      el.textContent = name;
      container.appendChild(el);
    });
  }

  // ── Render a single habit row (returns DOM element) ──
  function createHabitRow(habit) {
    const row = document.createElement('div');
    row.className = 'habit-row';
    row.dataset.id = habit.id;

    /* -- Habit name + delete button -- */
    const info = document.createElement('div');
    info.className = 'habit-info';

    const nameEl = document.createElement('span');
    nameEl.className = 'habit-name';
    nameEl.textContent = habit.name;
    nameEl.title = habit.name;

    const delBtn = document.createElement('button');
    delBtn.className = 'btn-delete';
    delBtn.textContent = '✕';
    delBtn.setAttribute('aria-label', `Delete habit: ${habit.name}`);
    delBtn.addEventListener('click', () => deleteHabit(habit.id));

    info.appendChild(nameEl);
    info.appendChild(delBtn);
    row.appendChild(info);

    /* -- 7 day checkboxes -- */
    habit.days.forEach((checked, dayIdx) => {
      const cell = document.createElement('div');
      cell.className = 'day-cell' + (dayIdx === todayIndex ? ' is-today' : '');

      const cbId = `cb-${habit.id}-${dayIdx}`;

      const checkbox = document.createElement('input');
      checkbox.type    = 'checkbox';
      checkbox.id      = cbId;
      checkbox.checked = checked;
      checkbox.setAttribute('aria-label', `${DAY_NAMES[dayIdx]} – ${habit.name}`);

      checkbox.addEventListener('change', () => {
        // Update state
        const h = state.habits.find(x => x.id === habit.id);
        if (h) {
          h.days[dayIdx] = checkbox.checked;
          saveState();
          renderProgress();
        }
      });

      const label = document.createElement('label');
      label.htmlFor = cbId;

      cell.appendChild(checkbox);
      cell.appendChild(label);
      row.appendChild(cell);
    });

    return row;
  }

  // ── Render full habit list ──
  function renderHabits() {
    const list  = document.getElementById('habitList');
    const empty = document.getElementById('emptyState');
    list.innerHTML = '';

    if (state.habits.length === 0) {
      empty.style.display = 'block';
    } else {
      empty.style.display = 'none';
      state.habits.forEach(habit => {
        list.appendChild(createHabitRow(habit));
      });
    }

    renderProgress();
  }

  // ── Full render ──
  function render() {
    document.getElementById('weekLabel').textContent = getWeekLabel();
    renderDayHeaders();
    renderHabits();
  }

  // ── Add a new habit ──
  function addHabit() {
    const input = document.getElementById('habitInput');
    const name  = input.value.trim();
    if (!name) return;

    const newHabit = {
      id:   uid(),
      name: name,
      days: [false, false, false, false, false, false, false]
    };

    state.habits.push(newHabit);
    saveState();
    input.value = '';

    // Append only the new row (no full re-render needed)
    const list  = document.getElementById('habitList');
    const empty = document.getElementById('emptyState');
    empty.style.display = 'none';
    list.appendChild(createHabitRow(newHabit));
    renderProgress();

    input.focus();
  }

  // ── Delete a habit ──
  function deleteHabit(id) {
    state.habits = state.habits.filter(h => h.id !== id);
    saveState();

    // Remove row from DOM
    const row = document.querySelector(`.habit-row[data-id="${id}"]`);
    if (row) {
      row.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
      row.style.opacity = '0';
      row.style.transform = 'translateX(-10px)';
      setTimeout(() => {
        row.remove();
        if (state.habits.length === 0) {
          document.getElementById('emptyState').style.display = 'block';
        }
        renderProgress();
      }, 200);
    }
  }

  // ── Reset all checks for the current week ──
  function clearWeek() {
    if (!confirm('Reset all check-ins for this week?')) return;
    state.habits.forEach(h => h.days.fill(false));
    saveState();
    renderHabits();
  }

  // ── Event listeners ──
  document.getElementById('btnAdd').addEventListener('click', addHabit);

  document.getElementById('habitInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addHabit();
  });

  document.getElementById('btnClearWeek').addEventListener('click', clearWeek);

  // ── Boot ──
  render();
</script>
</body>
</html>
